<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .sample { font-weight: 500; font-size: 15px; min-width: 140px; }
  .val { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--foreground-neutral-lighter); margin-left: auto; }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="row"><span class="sample" style="color:#25272a">fg-neutral-default</span><span class="val">#25272a</span></div>
    <div class="row"><span class="sample" style="color:#373c41">fg-neutral-light</span><span class="val">#373c41</span></div>
    <div class="row"><span class="sample" style="color:#62676c">fg-neutral-lighter</span><span class="val">#62676c</span></div>
    <div class="row"><span class="sample" style="color:#b4b8bb">fg-neutral-lightest</span><span class="val">#b4b8bb</span></div>
    <div class="row"><span class="sample" style="color:#008858">fg-primary-default</span><span class="val">#008858</span></div>
    <div class="row"><span class="sample" style="color:#006643">fg-primary-dark</span><span class="val">#006643</span></div>
    <div class="row"><span class="sample" style="color:#325fb4">fg-secondary-default</span><span class="val">#325fb4</span></div>
    <div class="row"><span class="sample" style="color:#d92d20">fg-negative-default</span><span class="val">#d92d20</span></div>
    <div class="row"><span class="sample" style="color:#079455">fg-positive-default</span><span class="val">#079455</span></div>
    <div class="row"><span class="sample" style="color:#dc6803">fg-warning-default</span><span class="val">#dc6803</span></div>
  </div>
</div>
</body></html>
