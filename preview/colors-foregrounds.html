<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .sample { font-weight: 500; font-size: 15px; min-width: 140px; }
  .val { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--foreground-neutral-lighter); margin-left: auto; }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="row"><span class="sample" style="color:var(--foreground-neutral-default)">fg-neutral-default</span><span class="val">#25272a</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-neutral-light)">fg-neutral-light</span><span class="val">#373c41</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-neutral-lighter)">fg-neutral-lighter</span><span class="val">#62676c</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-neutral-lightest)">fg-neutral-lightest</span><span class="val">#b4b8bb</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-primary-default)">fg-primary-default</span><span class="val">#008858</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-primary-dark)">fg-primary-dark</span><span class="val">#006643</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-secondary-default)">fg-secondary-default</span><span class="val">#325fb4</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-negative-default)">fg-negative-default</span><span class="val">#d92d20</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-positive-default)">fg-positive-default</span><span class="val">#079455</span></div>
    <div class="row"><span class="sample" style="color:var(--foreground-warning-default)">fg-warning-default</span><span class="val">#dc6803</span></div>
  </div>
</div>
</body></html>
