<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display:flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--foreground-neutral-lighter); min-width: 120px; margin-left:auto; }
  .lbl { font-size: 10px; color: var(--foreground-neutral-lighter); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; min-width: 72px; }
  .sample { color: var(--foreground-neutral-light); }
</style></head><body>
<div class="card">
  <div class="stack">
    <div class="row"><span class="lbl">Body L</span><span class="sample" style="font-size:16px; line-height:24px">รายละเอียดเพิ่มเติม — The quick brown fox.</span><span class="spec">16 / 24</span></div>
    <div class="row"><span class="lbl">Body M</span><span class="sample" style="font-size:14px; line-height:20px">รายละเอียดเพิ่มเติม — The quick brown fox.</span><span class="spec">14 / 20</span></div>
    <div class="row"><span class="lbl">Body S</span><span class="sample" style="font-size:12px; line-height:16px">รายละเอียดเพิ่มเติม — The quick brown fox.</span><span class="spec">12 / 16</span></div>
    <div class="row"><span class="lbl">Label XL</span><span class="sample" style="font-size:16px; line-height:24px; font-weight:500">ตัวอักษร Label</span><span class="spec">16 / 24</span></div>
    <div class="row"><span class="lbl">Label L</span><span class="sample" style="font-size:14px; line-height:21px; font-weight:500">ตัวอักษร Label</span><span class="spec">14 / 21</span></div>
    <div class="row"><span class="lbl">Label M</span><span class="sample" style="font-size:12px; line-height:18px; font-weight:500">ตัวอักษร Label</span><span class="spec">12 / 18</span></div>
    <div class="row"><span class="lbl">Label S</span><span class="sample" style="font-size:11px; line-height:16px; font-weight:500">ตัวอักษร Label</span><span class="spec">11 / 16</span></div>
  </div>
</div>
</body></html>
