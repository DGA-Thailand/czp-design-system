<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 12px; color: var(--input-label-default); font-weight: 500; }
  .input {
    border: 1px solid var(--input-stroke-default);
    border-radius: 12px;
    padding: 12px 14px;
    background: var(--input-background-default);
    color: var(--input-input-default);
    font-size: 16px;
    min-height: 48px;
    box-sizing: border-box;
    font-family: var(--font-family-base);
  }
  .input::placeholder { color: var(--input-input-placeholder); }
  .input.focused { border-color: var(--input-stroke-focused); outline: 2px solid var(--background-primary-lighter); }
  .input.error { border-color: var(--input-stroke-error); background: var(--input-background-error-focused); }
  .help-err { color: var(--foreground-negative-default); font-size: 12px; }
  .input.disabled, .input:disabled { background: var(--input-background-disabled); color: var(--input-input-placeholder); cursor: not-allowed; }
  /* Real focus states */
  .input:focus { border-color: var(--input-stroke-focused); outline: 2px solid var(--background-primary-lighter); background: var(--input-background-focused); }
  .input.error:focus { border-color: var(--input-stroke-error); outline: 2px solid var(--background-negative-light); background: var(--input-background-error-focused); }
  .input.disabled:focus, .input:disabled:focus { outline: none; }
  .field:focus-within .label { color: var(--input-label-focused); }
  .field:has(.error) .label { color: var(--input-label-error); }
  .field:has(.error):focus-within .label { color: var(--input-label-error); }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="field">
      <label class="label">อีเมล</label>
      <input class="input focused" value="citizen@example.co.th">
    </div>
    <div class="field">
      <label class="label">รหัสผ่าน</label>
      <input class="input error" type="password" value="••••">
      <div class="help-err">รหัสผ่านสั้นเกินไป</div>
    </div>
    <div class="field">
      <label class="label">ชื่อ-นามสกุล</label>
      <input class="input" placeholder="กรุณากรอกชื่อ">
    </div>
    <div class="field">
      <label class="label">เลขประจำตัว</label>
      <input class="input disabled" value="1-2345-67890-12-3" disabled>
    </div>
  </div>
</div>
</body></html>
