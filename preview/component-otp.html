<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .row { display: flex; gap: 12px; }
  .otp { display: flex; gap: 8px; }
  .cell {
    width: 44px; height: 52px; border-radius: 10px; border: 1.5px solid #dde0e2; background: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; color: #25272a;
  }
  .cell.focus { border-color: #008858; outline: 3px solid #ebfaf4; }
  .cell.err { border-color: #d92d20; color: #d92d20; }
  .lbl { font-size: 11px; color: #62676c; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; margin-bottom: 6px; }
  .col { display: flex; flex-direction: column; gap: 0; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="col">
      <div class="lbl">Default</div>
      <div class="otp"><div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell focus"></div><div class="cell"></div><div class="cell"></div></div>
    </div>
    <div class="col" style="margin-left:auto">
      <div class="lbl">Error</div>
      <div class="otp"><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div></div>
    </div>
  </div>
</div>
</body></html>
