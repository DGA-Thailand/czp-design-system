<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .row { display: flex; gap: 12px; }
  .otp { display: flex; gap: 8px; }
  .cell {
    width: 44px; height: 52px; border-radius: 10px; border: 1.5px solid var(--stroke-neutral-default); background: var(--canvas-white);
    display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; color: var(--foreground-neutral-default);
  }
  .cell.focus { border-color: var(--stroke-primary-default); outline: 3px solid var(--background-primary-lighter); }
  .cell.err { border-color: var(--foreground-negative-default); color: var(--foreground-negative-default); }
  .lbl { font-size: 11px; color: var(--foreground-neutral-lighter); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; margin-bottom: 6px; }
  .col { display: flex; flex-direction: column; gap: 0; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="col">
      <div class="lbl">Default</div>
      <div class="otp"><div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell focus"></div><div class="cell"></div><div class="cell"></div></div>
    </div>
    <div class="col" style="margin-left:auto">
      <div class="lbl">Error</div>
      <div class="otp"><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div><div class="cell err">9</div></div>
    </div>
  </div>
</div>
</body></html>
