<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .badge {
    border-radius: 1000px;
    border: 1px solid transparent;
    padding: 2px 10px;
    font-size: 12px;
    line-height: 18px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .b-default { background: var(--button-background-primary-solid); color: var(--button-foreground-primary-on-solid); }
  .b-secondary { background: var(--background-secondary-lighter); color: var(--foreground-secondary-default); border-color: var(--secondary-80); }
  .b-destructive { background: var(--button-background-negative-solid); color: var(--canvas-white); }
  .b-success { background: var(--background-positive-medium); color: var(--canvas-white); }
  .b-outline { background: transparent; color: var(--foreground-neutral-default); border-color: var(--stroke-neutral-default); }
  .b-warning-soft { background: var(--warning-90); color: var(--foreground-warning-dark); border-color: var(--warning-80); }
  .b-info-soft { background: var(--background-info-light); color: var(--info-30); border-color: var(--info-80); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style></head><body>
<div class="card">
  <div class="row">
    <span class="badge b-default">3</span>
    <span class="badge b-destructive">ด่วน</span>
    <span class="badge b-success"><span class="dot"></span>ใช้งานได้</span>
    <span class="badge b-secondary">รอดำเนินการ</span>
    <span class="badge b-warning-soft">รอตรวจสอบ</span>
    <span class="badge b-info-soft">ข้อมูลใหม่</span>
    <span class="badge b-outline">เอกสาร</span>
  </div>
</div>
</body></html>
