<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    border-radius: 1000px;
    font-weight: 500;
    font-size: 16px;
    padding: 0 16px;
    min-height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .default { background: var(--button-background-primary-solid); color: var(--button-foreground-primary-on-solid); }
  .destructive { background: var(--button-background-negative-solid); color: var(--button-foreground-primary-on-solid); }
  .outline { background: transparent; color: var(--button-foreground-primary-on-transparent); border: 1px solid var(--button-stroke-primary); }
  .secondary { background: var(--button-background-secondary-subtle); color: var(--button-foreground-secondary-on-subtle); }
  .tertiary { background: var(--background-neutral-medium); color: var(--foreground-neutral-light); }
  .ghost { background: transparent; color: var(--foreground-neutral-light); }
  .link { background: transparent; color: var(--foreground-primary-default); text-decoration: underline; padding: 0 8px; min-height: auto; }
  .disabled { background: var(--button-background-disabled); color: var(--button-foreground-disabled); cursor: not-allowed; }
</style></head><body>
<div class="card">
  <div class="row">
    <button class="btn default">ยืนยัน</button>
    <button class="btn destructive">ลบ</button>
    <button class="btn outline">ยกเลิก</button>
    <button class="btn secondary">สำรอง</button>
    <button class="btn tertiary">ข้าม</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn link">ลิงก์</button>
    <button class="btn disabled" disabled>ปิดใช้งาน</button>
  </div>
</div>
</body></html>
