<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display:flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--foreground-neutral-lighter); min-width: 120px; }
  .lbl { font-size: 10px; color: var(--foreground-neutral-lighter); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; min-width: 88px; }
</style></head><body>
<div class="card">
  <div class="stack">
    <div class="row"><span class="lbl">Headline L</span><span style="font-size:32px; line-height:40px; font-weight:600">บริการออนไลน์</span><span class="spec">32 / 40</span></div>
    <div class="row"><span class="lbl">Headline M</span><span style="font-size:28px; line-height:36px; font-weight:600">บริการออนไลน์</span><span class="spec">28 / 36</span></div>
    <div class="row"><span class="lbl">Headline S</span><span style="font-size:24px; line-height:32px; font-weight:600">บริการออนไลน์</span><span class="spec">24 / 32</span></div>
    <div class="row"><span class="lbl">Title L</span><span style="font-size:18px; line-height:26px; font-weight:600">บริการออนไลน์</span><span class="spec">18 / 26</span></div>
    <div class="row"><span class="lbl">Title M</span><span style="font-size:16px; line-height:24px; font-weight:600">บริการออนไลน์</span><span class="spec">16 / 24</span></div>
    <div class="row"><span class="lbl">Title S</span><span style="font-size:14px; line-height:20px; font-weight:600">บริการออนไลน์</span><span class="spec">14 / 20</span></div>
  </div>
</div>
</body></html>
