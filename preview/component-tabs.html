<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--stroke-neutral-lighter); }
  .tab { padding: 12px 16px; font-size: 14px; color: var(--foreground-neutral-lighter); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; }
  .tab.active { color: var(--foreground-primary-default); border-color: var(--stroke-primary-default); font-weight: 600; }
  .pills { display: flex; gap: 8px; margin-top: 20px; background: var(--background-neutral-medium); padding: 4px; border-radius: 1000px; width: fit-content; }
  .pill { padding: 8px 16px; font-size: 13px; color: var(--foreground-neutral-lighter); border-radius: 1000px; cursor: pointer; font-weight: 500; }
  .pill.active { background: var(--canvas-white); color: var(--foreground-neutral-default); box-shadow: 0 1px 2px rgba(0,0,0,.05); }
</style></head><body>
<div class="card">
  <div class="tabs">
    <div class="tab active">ทั้งหมด</div>
    <div class="tab">กำลังดำเนินการ</div>
    <div class="tab">เสร็จสิ้น</div>
    <div class="tab">ยกเลิก</div>
  </div>
  <div class="pills">
    <div class="pill active">รายวัน</div>
    <div class="pill">รายสัปดาห์</div>
    <div class="pill">รายเดือน</div>
  </div>
</div>
</body></html>
