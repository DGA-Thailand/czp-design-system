<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .avatar { width: 44px; height: 44px; border-radius: 1000px; background: linear-gradient(135deg, #00b274, #008858); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; flex-shrink: 0; }
  .avatar.sm { width: 28px; height: 28px; font-size: 12px; }
  .avatar.lg { width: 64px; height: 64px; font-size: 22px; }
  .avatar.secondary { background: linear-gradient(135deg, #5f88d3, #325fb4); }
  .avatar.neutral { background: #ebecee; color: #62676c; }
  .stack { display: flex; }
  .stack .avatar { border: 2px solid #fff; margin-left: -10px; }
  .stack .avatar:first-child { margin-left: 0; }
  .plus { background: #dfe7f6; color: #325fb4; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="avatar sm">ก</div>
    <div class="avatar">ก</div>
    <div class="avatar lg">ก</div>
    <div class="avatar secondary">ส</div>
    <div class="avatar neutral">?</div>
    <div class="stack">
      <div class="avatar">A</div>
      <div class="avatar secondary">B</div>
      <div class="avatar neutral">C</div>
      <div class="avatar plus">+5</div>
    </div>
  </div>
</div>
</body></html>
