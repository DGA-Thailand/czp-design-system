<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  /* switch */
  .sw { position: relative; width: 44px; height: 24px; background: #dde0e2; border-radius: 1000px; transition: .2s; }
  .sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2); transition: .2s; }
  .sw.on { background: #008858; }
  .sw.on::after { left: 22px; }
  /* checkbox */
  .cb { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid #dde0e2; background: #fff; display: inline-flex; align-items: center; justify-content: center; }
  .cb.on { background: #008858; border-color: #008858; color: #fff; font-size: 13px; font-weight: 700; }
  /* radio */
  .r { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #dde0e2; background: #fff; display: inline-flex; align-items: center; justify-content: center; }
  .r.on { border-color: #008858; }
  .r.on::after { content:''; width: 10px; height: 10px; border-radius: 50%; background: #008858; }
  .lab { font-size: 14px; color: #25272a; display: flex; align-items: center; gap: 8px; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="lab"><span class="sw"></span> ปิด</div>
    <div class="lab"><span class="sw on"></span> เปิด</div>
    <div class="lab"><span class="cb"></span> ตัวเลือก</div>
    <div class="lab"><span class="cb on">✓</span> เลือกแล้ว</div>
    <div class="lab"><span class="r"></span> Option A</div>
    <div class="lab"><span class="r on"></span> Option B</div>
  </div>
</div>
</body></html>
