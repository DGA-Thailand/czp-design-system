<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 10px; height: 160px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--primary-30-base); border-radius: 4px; width: 36px; }
  .name { font-size: 10px; font-weight: 600; color: var(--foreground-neutral-default); }
  .val { font-family: ui-monospace, Menlo, monospace; font-size: 9px; color: var(--foreground-neutral-lighter); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="item"><div class="bar" style="height: 2px"></div><div class="name">xxs</div><div class="val">2</div></div>
    <div class="item"><div class="bar" style="height: 4px"></div><div class="name">xs</div><div class="val">4</div></div>
    <div class="item"><div class="bar" style="height: 6px"></div><div class="name">sm</div><div class="val">6</div></div>
    <div class="item"><div class="bar" style="height: 8px"></div><div class="name">md</div><div class="val">8</div></div>
    <div class="item"><div class="bar" style="height: 12px"></div><div class="name">lg</div><div class="val">12</div></div>
    <div class="item"><div class="bar" style="height: 16px"></div><div class="name">xl</div><div class="val">16</div></div>
    <div class="item"><div class="bar" style="height: 20px"></div><div class="name">2xl</div><div class="val">20</div></div>
    <div class="item"><div class="bar" style="height: 24px"></div><div class="name">3xl</div><div class="val">24</div></div>
    <div class="item"><div class="bar" style="height: 32px"></div><div class="name">4xl</div><div class="val">32</div></div>
    <div class="item"><div class="bar" style="height: 40px"></div><div class="name">5xl</div><div class="val">40</div></div>
    <div class="item"><div class="bar" style="height: 48px"></div><div class="name">6xl</div><div class="val">48</div></div>
    <div class="item"><div class="bar" style="height: 64px"></div><div class="name">7xl</div><div class="val">64</div></div>
    <div class="item"><div class="bar" style="height: 80px"></div><div class="name">8xl</div><div class="val">80</div></div>
    <div class="item"><div class="bar" style="height: 96px"></div><div class="name">9xl</div><div class="val">96</div></div>
    <div class="item"><div class="bar" style="height: 128px"></div><div class="name">10xl</div><div class="val">128</div></div>
  </div>
</div>
</body></html>
