<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; gap: 12px; align-items:flex-end; }
  .s { flex:1; display:flex; flex-direction:column; gap:6px; }
  .sw { height: 64px; border-radius: 10px; border: 1px solid var(--stroke-neutral-lighter); }
  .star { position:absolute; top:6px; right:8px; font-size: 13px; color: white; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
  .sw-wrap { position:relative; }
  .name { font-size: 11px; font-weight: 600; color: var(--foreground-neutral-default); }
  .hex { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--foreground-neutral-lighter); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-0)"></div></div><div class="name">0</div><div class="hex">#0e1c34</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-10)"></div></div><div class="name">10</div><div class="hex">#142748</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-20)"></div></div><div class="name">20</div><div class="hex">#1f3c70</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-30)"></div></div><div class="name">30</div><div class="hex">#274b8c</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-40-main)"><div class="star">★</div></div></div><div class="name">40</div><div class="hex">#325fb4</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-50)"></div></div><div class="name">50</div><div class="hex">#396bc8</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-60)"></div></div><div class="name">60</div><div class="hex">#5f88d3</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-70)"></div></div><div class="name">70</div><div class="hex">#87a5de</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-80)"></div></div><div class="name">80</div><div class="hex">#c3d2ee</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-90)"></div></div><div class="name">90</div><div class="hex">#dfe7f6</div></div>
    <div class="s"><div class="sw-wrap"><div class="sw" style="background:var(--secondary-95)"></div></div><div class="name">95</div><div class="hex">#eff3fa</div></div>
  </div>
</div>
</body></html>
