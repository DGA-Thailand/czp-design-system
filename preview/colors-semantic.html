<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .group-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--foreground-neutral-lighter); margin-bottom: 8px; }
  .rowx { display: flex; gap: 6px; align-items: flex-end; }
  .s { flex:1; display:flex; flex-direction:column; gap:4px; }
  .sw { height: 38px; border-radius: 6px; border: 1px solid var(--stroke-neutral-lighter); }
  .hex { font-family: ui-monospace, Menlo, monospace; font-size: 9px; color: var(--foreground-neutral-lighter); text-align: center; }
</style></head><body>
<div class="card">
  <div class="grid">
    <div>
      <div class="group-label" style="color:var(--danger-40)">Danger</div>
      <div class="rowx">
        <div class="s"><div class="sw" style="background:var(--danger-20)"></div><div class="hex">20</div></div>
        <div class="s"><div class="sw" style="background:var(--danger-40); outline: 2px solid var(--danger-40); outline-offset: 2px"></div><div class="hex">40★</div></div>
        <div class="s"><div class="sw" style="background:var(--danger-50)"></div><div class="hex">50</div></div>
        <div class="s"><div class="sw" style="background:var(--danger-80)"></div><div class="hex">80</div></div>
        <div class="s"><div class="sw" style="background:var(--danger-95)"></div><div class="hex">95</div></div>
      </div>
    </div>
    <div>
      <div class="group-label" style="color:var(--positive-40)">Positive</div>
      <div class="rowx">
        <div class="s"><div class="sw" style="background:var(--positive-20)"></div><div class="hex">20</div></div>
        <div class="s"><div class="sw" style="background:var(--positive-40)"></div><div class="hex">40</div></div>
        <div class="s"><div class="sw" style="background:var(--positive-50); outline: 2px solid var(--positive-50); outline-offset: 2px"></div><div class="hex">50★</div></div>
        <div class="s"><div class="sw" style="background:var(--positive-80)"></div><div class="hex">80</div></div>
        <div class="s"><div class="sw" style="background:var(--positive-95)"></div><div class="hex">95</div></div>
      </div>
    </div>
    <div>
      <div class="group-label" style="color:var(--warning-40)">Warning</div>
      <div class="rowx">
        <div class="s"><div class="sw" style="background:var(--warning-20)"></div><div class="hex">20</div></div>
        <div class="s"><div class="sw" style="background:var(--warning-40)"></div><div class="hex">40</div></div>
        <div class="s"><div class="sw" style="background:var(--warning-50)"></div><div class="hex">50</div></div>
        <div class="s"><div class="sw" style="background:var(--warning-60); outline: 2px solid var(--warning-60); outline-offset: 2px"></div><div class="hex">60★</div></div>
        <div class="s"><div class="sw" style="background:var(--warning-95)"></div><div class="hex">95</div></div>
      </div>
    </div>
    <div>
      <div class="group-label" style="color:var(--info-50)">Info</div>
      <div class="rowx">
        <div class="s"><div class="sw" style="background:var(--info-30)"></div><div class="hex">30</div></div>
        <div class="s"><div class="sw" style="background:var(--info-40)"></div><div class="hex">40</div></div>
        <div class="s"><div class="sw" style="background:var(--info-50); outline: 2px solid var(--info-50); outline-offset: 2px"></div><div class="hex">50★</div></div>
        <div class="s"><div class="sw" style="background:var(--info-80)"></div><div class="hex">80</div></div>
        <div class="s"><div class="sw" style="background:var(--info-95)"></div><div class="hex">95</div></div>
      </div>
    </div>
  </div>
</div>
</body></html>
