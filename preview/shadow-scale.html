<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 24px; padding: 12px 4px 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
  .box { width: 120px; height: 80px; background: var(--canvas-white); border-radius: 12px; }
  .name { font-size: 11px; font-weight: 600; color: var(--foreground-neutral-default); }
  .val { font-family: ui-monospace, Menlo, monospace; font-size: 9px; color: var(--foreground-neutral-lighter); text-align: center; max-width: 160px; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="item">
      <div class="box" style="box-shadow: 0 4px 6px -1px rgba(62, 67, 76, 0.05)"></div>
      <div class="name">shadow-custom</div>
      <div class="val">0 4px 6px -1px rgba(62,67,76,.05)</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 10px 15px -3px rgba(62, 67, 76, 0.1), 0 4px 6px -2px rgba(62, 67, 76, 0.05)"></div>
      <div class="name">shadow-custom-lg</div>
      <div class="val">0 10px 15px -3px / 0 4px 6px -2px</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 20px 25px -5px rgba(62, 67, 76, 0.1), 0 10px 10px -5px rgba(62, 67, 76, 0.04)"></div>
      <div class="name">shadow-custom-xl</div>
      <div class="val">0 20px 25px -5px / 0 10px 10px -5px</div>
    </div>
  </div>
</div>
</body></html>
