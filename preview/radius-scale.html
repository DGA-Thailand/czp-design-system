<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--primary-95); border: 2px solid var(--primary-30-base); width: 72px; height: 72px; }
  .name { font-size: 10px; font-weight: 600; color: var(--foreground-neutral-default); }
  .val { font-family: ui-monospace, Menlo, monospace; font-size: 9px; color: var(--foreground-neutral-lighter); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="name">xxs</div><div class="val">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="val">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">lg</div><div class="val">10px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">xl</div><div class="val">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">2xl</div><div class="val">16px</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">3xl</div><div class="val">20px</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="name">4xl</div><div class="val">24px</div></div>
    <div class="item"><div class="box" style="border-radius:1000px"></div><div class="name">full</div><div class="val">1000px</div></div>
  </div>
</div>
</body></html>
