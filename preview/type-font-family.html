<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .sample { font-size: 40px; line-height: 1; color: var(--foreground-neutral-default); }
  .w { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--foreground-neutral-lighter); }
  .name { font-size: 11px; color: var(--foreground-neutral-default); font-weight: 500; }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="col"><div class="sample" style="font-weight:100">Aa</div><div class="name">Thin</div><div class="w">100</div></div>
    <div class="col"><div class="sample" style="font-weight:200">Aa</div><div class="name">ExtraLight</div><div class="w">200</div></div>
    <div class="col"><div class="sample" style="font-weight:300">Aa</div><div class="name">Light</div><div class="w">300</div></div>
    <div class="col"><div class="sample" style="font-weight:400">Aa</div><div class="name">Regular</div><div class="w">400</div></div>
    <div class="col"><div class="sample" style="font-weight:500">Aa</div><div class="name">Medium</div><div class="w">500</div></div>
    <div class="col"><div class="sample" style="font-weight:600">Aa</div><div class="name">SemiBold</div><div class="w">600</div></div>
    <div class="col"><div class="sample" style="font-weight:700">Aa</div><div class="name">Bold</div><div class="w">700</div></div>
  </div>
  <div style="margin-top: 16px; font-size: 11px; color: var(--foreground-neutral-lighter);">Anuphan — Thai + Latin, 7 static weights self-hosted (Thin → Bold)</div>
</div>
</body></html>
