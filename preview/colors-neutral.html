<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; gap: 10px; align-items:flex-end; }
  .s { flex:1; display:flex; flex-direction:column; gap:6px; }
  .sw { height: 56px; border-radius: 8px; border: 1px solid var(--stroke-neutral-lighter); }
  .name { font-size: 11px; font-weight: 600; color: var(--foreground-neutral-default); }
  .hex { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--foreground-neutral-lighter); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="s"><div class="sw" style="background:var(--neutral-0)"></div><div class="name">0</div><div class="hex">#000000</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-10)"></div><div class="name">10</div><div class="hex">#151618</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-20)"></div><div class="name">20</div><div class="hex">#25272a</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-25)"></div><div class="name">25</div><div class="hex">#2a2d31</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-40)"></div><div class="name">40</div><div class="hex">#373c41</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-60)"></div><div class="name">60</div><div class="hex">#62676c</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-70)"></div><div class="name">70</div><div class="hex">#8b9094</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-80)"></div><div class="name">80</div><div class="hex">#b4b8bb</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-90)"></div><div class="name">90</div><div class="hex">#dde0e2</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-94)"></div><div class="name">94</div><div class="hex">#ebecee</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-96)"></div><div class="name">96</div><div class="hex">#f1f3f3</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-98)"></div><div class="name">98</div><div class="hex">#f8f9f9</div></div>
    <div class="s"><div class="sw" style="background:var(--neutral-100)"></div><div class="name">100</div><div class="hex">#ffffff</div></div>
  </div>
</div>
</body></html>
