<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .wrap { background: var(--canvas-white); border: 1px solid var(--stroke-neutral-lighter); border-radius: 12px; padding: 8px; max-width: 320px; box-shadow: var(--shadow-custom-lg); }
  .item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14px; color: var(--foreground-neutral-default); cursor: pointer; }
  .item:hover, .item.active { background: var(--background-neutral-medium); }
  .item.danger { color: var(--foreground-negative-default); }
  .ico { width: 18px; height: 18px; border-radius: 4px; background: var(--background-neutral-dark); }
  .item.danger .ico { background: var(--danger-90); }
  .sep { height: 1px; background: var(--stroke-neutral-lighter); margin: 4px 0; }
  .sc { margin-left: auto; font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--foreground-neutral-lighter); }
</style></head><body>
<div class="card">
  <div class="wrap">
    <div class="item active"><span class="ico"></span>โปรไฟล์ของฉัน<span class="sc">⌘P</span></div>
    <div class="item"><span class="ico"></span>การตั้งค่า</div>
    <div class="item"><span class="ico"></span>ช่วยเหลือ</div>
    <div class="sep"></div>
    <div class="item danger"><span class="ico"></span>ออกจากระบบ</div>
  </div>
</div>
</body></html>
