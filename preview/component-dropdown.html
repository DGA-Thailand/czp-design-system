<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--canvas-bright); }
  .wrap { background: #fff; border: 1px solid #ebecee; border-radius: 12px; padding: 8px; max-width: 320px; box-shadow: 0 10px 15px -3px rgba(62,67,76,.1), 0 4px 6px -2px rgba(62,67,76,.05); }
  .item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14px; color: #25272a; cursor: pointer; }
  .item:hover, .item.active { background: #f1f3f3; }
  .item.danger { color: #d92d20; }
  .ico { width: 18px; height: 18px; border-radius: 4px; background: #ebecee; }
  .item.danger .ico { background: #fee4e2; }
  .sep { height: 1px; background: #ebecee; margin: 4px 0; }
  .sc { margin-left: auto; font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #8b9094; }
</style></head><body>
<div class="card">
  <div class="wrap">
    <div class="item active"><span class="ico"></span>โปรไฟล์ของฉัน<span class="sc">⌘P</span></div>
    <div class="item"><span class="ico"></span>การตั้งค่า</div>
    <div class="item"><span class="ico"></span>ช่วยเหลือ</div>
    <div class="sep"></div>
    <div class="item danger"><span class="ico"></span>ออกจากระบบ</div>
  </div>
</div>
</body></html>
