[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/docs/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200

[[redirects]]
  from = "/foundations/*"
  to = "/docs/foundations/:splat"
  status = 200

[[redirects]]
  from = "/components/*"
  to = "/docs/components/:splat"
  status = 200

[[redirects]]
  from = "/resources/*"
  to = "/docs/resources/:splat"
  status = 200

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"
